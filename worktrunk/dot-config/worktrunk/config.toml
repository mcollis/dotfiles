# >>> ex-plugin worktrunk (managed) >>>
# ExtraHop worktree conventions for worktrunk (wt). Installed by the `ex`
# Claude Code plugin via contrib/worktrunk/install.sh. Edit the plugin copy,
# not this block — re-running the installer overwrites everything between the
# >>> ex-plugin >>> / <<< ex-plugin <<< markers.
#
# Pairs with these ex skills:
#   - ex:worktree-prune        (relies on the lowercase-slug worktree path)
#
# Worktree location: sibling <repo>-worktrees/ dir, lowercase branch slug.
# `| lower` is REQUIRED — prune's Docker scoping assumes lowercase dirs.
# NOTE: this is a singleton key. If your config already sets worktree-path,
# the installer will NOT add this line — reconcile by hand.
worktree-path = "{{ repo_path }}/../{{ repo | replace('.git', '') }}-worktrees/{{ branch | sanitize | lower }}"

# ── CREATE: shared ExtraHop ticket environment. ───────────────────────────────
# Write .envrc (TICKET_ID parsed from branch) and trust it with direnv.
# Non-EX/OZ branches get an empty .envrc. Project-specific setup belongs in a
# remote-scoped Worktrunk block owned by that project's agent bundle.
[[pre-start]]
envrc = """
set -e
WT={{ worktree_path }}
BRANCH={{ branch }}
TICKET=$(printf '%s' "$BRANCH" | grep -oiE '(ex|oz)-[0-9]+' | head -1 | tr 'a-z' 'A-Z' || true)
{
  [ -n "$TICKET" ] && printf 'export TICKET_ID="%s"\\n' "$TICKET"
} > "$WT/.envrc"
command -v direnv >/dev/null 2>&1 && direnv allow "$WT/.envrc" || true
"""

# Keep the shared ticket environment out of commits.
[[pre-start]]
exclude-envrc = """
set -e
WT={{ worktree_path }}
COMMON_DIR="$(git -C "$WT" rev-parse --git-common-dir)"
case "$COMMON_DIR" in
  /*) ;;
  *) COMMON_DIR="$WT/$COMMON_DIR" ;;
esac
EXCLUDE="$COMMON_DIR/info/exclude"
mkdir -p "$(dirname "$EXCLUDE")"
grep -qxF '.envrc' "$EXCLUDE" 2>/dev/null || printf '%s\n' '.envrc' >> "$EXCLUDE"
"""

# Alias: `wt ex EX-123` -> create the team-convention branch, stay in bare repo.
# NOTE: singleton [aliases] table. If your config already has [aliases], the
# installer adds this block anyway (TOML merges tables), but a duplicate `ex`
# key within it is an error — remove your own `ex` alias first if you have one.
[aliases]
ex = "wt switch --create --no-cd user/$USER/{{ args[0] }} {% if base %}--base {{ base }}{% endif %}"
# <<< ex-plugin worktrunk (managed) <<<

# worktrunk user config. Authored in the dotfiles repo, deployed via stow
# (-> ~/.config/worktrunk/config.toml).
#
# The ExtraHop worktree conventions (hooks, slug path, `wt ex` alias) are NOT
# hand-maintained here — they are installed as a managed block by the `ex`
# Claude Code plugin:
#   ~/.agents/plugins/ex/contrib/worktrunk/install.sh
# Keep only personal, non-EX preferences in this file outside that block.

# Persistent flags for `wt list`.
[list]
full = true
branches = true

# ── Personal tmux window management (NOT part of the ex plugin) ──────────────
# These were extracted from the ex fragment because window navigation/labeling
# is a personal preference, not an EX/team convention. They live outside the
# >>> ex-plugin >>> markers so install.sh never refreshes them away.
# update_labels() is defined in ~/.config/direnv/direnvrc (sets @wl/@wr + webpack
# pidfile vars from TICKET_ID/UI_PORT). worktree-prune no longer depends on @wl —
# it associates tmux windows by pane cwd — so this is purely cosmetic/personal.

# Append the update_labels call to the .envrc the ex `envrc` hook just wrote
# (runs after it; the ex hook truncates with >, this appends with >>).
[[pre-start]]
labels = """
WT={{ worktree_path }}
[ -f "$WT/.envrc" ] && printf 'update_labels\\n' >> "$WT/.envrc"
command -v direnv >/dev/null 2>&1 && direnv allow "$WT/.envrc" || true
"""

# Navigate-or-open a per-worktree surface (fires on create AND re-open).
# Detects the active multiplexer and drives exactly one — never both.
#   herdr wins when its server is live (HERDR_ENV=1 + reachable socket);
#   tmux is a fallback, used only if $TMUX_PANE is a REAL live pane. A bare
#   $TMUX check is unsafe — the var leaks stale after tmux exits (verified).
[post-switch]
mux = """
WT={{ worktree_path }}
BRANCH={{ branch }}
TICKET=$(printf '%s' "$BRANCH" | grep -oiE '(ex|oz)-[0-9]+' | head -1 | tr 'a-z' 'A-Z' || true)
WL=${TICKET:-$(printf '%s' "$BRANCH" | tr '/' '-')}
if [ "${HERDR_ENV:-}" = "1" ] && [ -S "${HERDR_SOCKET_PATH:-}" ]; then
  # herdr: open (or focus, if already open) a workspace bound to the worktree.
  herdr worktree open --path "$WT" --label "$WL" --focus >/dev/null 2>&1 || true
elif [ -n "${TMUX:-}" ] && tmux list-panes -F '#{pane_id}' 2>/dev/null | grep -qxF "${TMUX_PANE:-x}"; then
  IDX=$(tmux list-windows -F '#{window_index} #{@wl}' | awk -v w="$WL" '$2==w{print $1; exit}')
  if [ -n "$IDX" ]; then
    tmux select-window -t "$IDX"
  else
    WIN=$(tmux new-window -P -F '#{window_id}' -c "$WT")
    tmux split-window -d -h -c "$WT" -t "$WIN"
  fi
fi
"""

# Close the Herdr workspace at PRE-remove while the target worktree still
# exists, so its path -> workspace mapping remains available. Query through
# that worktree rather than the bare repository: Herdr rejects bare paths.
# `workspace close` leaves the Git checkout intact; wt still owns deletion.
[[pre-remove]]
herdr = """
WT={{ worktree_path }}
if [ "${HERDR_ENV:-}" = "1" ] && [ -S "${HERDR_SOCKET_PATH:-}" ]; then
  herdr worktree list --cwd "$WT" --json 2>/dev/null \
    | WT="$WT" python3 -c "import json,os,sys
try: d=json.load(sys.stdin)['result']['worktrees']
except Exception: sys.exit(0)
for w in d:
    if w.get('path')==os.environ['WT'] and w.get('open_workspace_id'):
        print(w['open_workspace_id']); break" 2>/dev/null \
    | while read -r WS; do
        [ -n "$WS" ] && herdr workspace close "$WS" >/dev/null 2>&1 || true
      done
fi
"""

# Kill the worktree's tmux window on removal. Runs post-remove (tmux window
# lookup is by @wl label, unaffected by git worktree deletion). Guarded on a
# REAL live pane so a stale $TMUX var can't target a dead/wrong server.
[[post-remove]]
tmux = """
BRANCH={{ branch }}
TICKET=$(printf '%s' "$BRANCH" | grep -oiE '(ex|oz)-[0-9]+' | head -1 | tr 'a-z' 'A-Z' || true)
WL=${TICKET:-$BRANCH}
if [ -n "${TMUX:-}" ] && tmux list-panes -F '#{pane_id}' 2>/dev/null | grep -qxF "${TMUX_PANE:-x}"; then
  tmux list-windows -a -F '#{session_name}:#{window_index} #{@wl}' 2>/dev/null | awk -v w="$WL" '$2==w{print $1}' | while read -r IDX; do
    tmux kill-window -t "$IDX" || true
  done
fi
"""

# >>> depot-agents worktrunk (managed) >>>
# Depot-specific lifecycle hooks. Installed by worktrunk/install.sh after the
# bundle is projected to ~/.agents/projects/depot.

[projects."gitlab.i.extrahop.com/core/depot".pre-start]
agents = """
"$HOME/.agents/projects/depot/worktrunk/pre-start.sh" "{{ repo_path }}" "{{ worktree_path }}" "{{ branch }}"
"""

[projects."gitlab.i.extrahop.com/core/depot".pre-remove]
cleanup = """
"$HOME/.agents/projects/depot/worktrunk/pre-remove.sh" "{{ worktree_path }}" "{{ branch }}"
"""
# <<< depot-agents worktrunk (managed) <<<
