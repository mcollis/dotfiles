onboarding = false
[ui]
agent_panel_sort = "spaces"

show_agent_labels_on_pane_borders = true

[ui.sidebar.spaces]
row_gap = 1
rows = [
  [{ token = "state_icon" }, { token = "workspace", bold = true }],
  [{ token = "branch", dim = true }, { token = "git_status", dim = true }],
]

[ui.sidebar.agents]
row_gap = 1

[theme]
name = "one-dark"

auto_switch = false
[ui.toast]
delivery = "herdr"

[keys]
swap_pane_left  = "prefix+shift+h"
swap_pane_down  = "prefix+shift+j"
swap_pane_up    = "prefix+shift+k"
swap_pane_right = "prefix+shift+l"

[[keys.command]]
key = "prefix+t"
type = "plugin_action"
command = "herdr-lazygit.open-lazygit-tab"
description = "Open lazygit in a tab"

[experimental]
switch_ascii_input_source_in_prefix = true

[ui.sound]
enabled = false
